name: Hot News Crawler

on:
  schedule:
    - cron: '0 8,20 * * *'
  workflow_dispatch:

permissions:
  contents: write  # 允许工作流修改仓库文件

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行爬虫
        run: python main.py

      - name: 提交并推送结果
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/
          git commit -m "更新热点数据 $(date +'%Y-%m-%d %H:%M')" || echo "没有新数据需要提交"
          git push
